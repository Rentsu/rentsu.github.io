<!DOCTYPE html>
<html>
<head>
<title>Projects - VIERNES</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Projects</h1>

<div>
<button onclick="filter('all')">All</button>
<button onclick="filter('web')">Web</button>
<button onclick="filter('mobile')">Mobile</button>
</div>

<div id="gallery">
<div class="project web">Project 1</div>
<div class="project mobile">Project 2</div>
</div>

<script>
function filter(type){
document.querySelectorAll(".project").forEach(p=>{
p.style.display = (type==="all"||p.classList.contains(type))?"block":"none";
});
}
</script>

</body>
</html>
